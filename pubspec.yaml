name: streaklearn
description: A new Flutter project for the StreakLearn hiring hackathon.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^8.1.0
  shared_preferences: ^2.2.2
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/mock_data/lessons.json
    - assets/mock_data/quizzes.json